            { id: 137, topic: "titulo3", tags: [], question: "¿A quién corresponde la iniciativa legislativa?", options: ["Sólo al Gobierno", "Al Gobierno, al Congreso y al Senado, de acuerdo con la Constitución y los Reglamentos de las Cámaras", "Al Gobierno y al Rey", "Sólo al Congreso"], correctIndex: 1, article: "Art. 87.1 CE", feedback: "La iniciativa legislativa corresponde al Gobierno, al Congreso y al Senado..." },
            { id: 138, topic: "titulo3", tags: ["numeros"], question: "Para la iniciativa legislativa popular, se exigirán no menos de:", options: ["100.000 firmas acreditadas", "250.000 firmas acreditadas", "500.000 firmas acreditadas", "1.000.000 firmas acreditadas"], correctIndex: 2, article: "Art. 87.3 CE", feedback: "Una ley orgánica regulará las formas de ejercicio y requisitos de la iniciativa popular... En todo caso se exigirán no menos de 500.000 firmas acreditadas." },
            { id: 139, topic: "titulo3", tags: [], question: "¿Se puede aplicar la iniciativa popular en materias propias de ley orgánica o tributarias?", options: ["Sí, en todas", "No procederá dicha iniciativa en estas materias, ni en carácter internacional ni gracia", "Sólo si lo aprueba el Gobierno", "Sí, pero se necesitan más firmas"], correctIndex: 1, article: "Art. 87.3 CE", feedback: "No procederá dicha iniciativa en materias propias de ley orgánica, tributarias o de carácter internacional, ni en lo relativo a la prerrogativa de gracia." },
            { id: 140, topic: "titulo3", tags: [], question: "En caso de extraordinaria y urgente necesidad, el Gobierno podrá dictar disposiciones legislativas provisionales que tomarán la forma de:", options: ["Leyes Orgánicas", "Decretos-leyes", "Reales Decretos", "Reglamentos"], correctIndex: 1, article: "Art. 86.1 CE", feedback: "...el Gobierno podrá dictar disposiciones legislativas provisionales que tomarán la forma de Decretos-leyes..." },
            { id: 141, topic: "titulo3", tags: ["plazos"], question: "Los Decretos-leyes deberán ser sometidos a debate y votación de totalidad al Congreso en el plazo de los:", options: ["15 días siguientes a su promulgación", "20 días siguientes a su promulgación", "30 días siguientes a su promulgación", "2 meses siguientes a su promulgación"], correctIndex: 2, article: "Art. 86.2 CE", feedback: "...deberán ser inmediatamente sometidos a debate y votación de totalidad al Congreso... en el plazo de los treinta días siguientes a su promulgación." },
            { id: 142, topic: "titulo3", tags: [], question: "¿A quién deben comunicar inmediatamente el Gobierno los tratados o convenios (que no exijan autorización previa de las Cortes)?", options: ["Al Rey", "Al Congreso y al Senado", "Al Tribunal Constitucional", "Al Consejo de Estado"], correctIndex: 1, article: "Art. 94.2 CE", feedback: "El Congreso y el Senado serán inmediatamente informados de la conclusión de los restantes tratados o convenios." },

            { id: 143, topic: "titulo4", tags: ["plazos", "mayorias"], question: "En la investidura del Presidente del Gobierno, si no se alcanza la mayoría absoluta en primera votación, la misma propuesta se someterá a nueva votación pasadas:", options: ["24 horas", "48 horas", "72 horas", "5 días"], correctIndex: 1, article: "Art. 99.3 CE", feedback: "Si el Congreso... no otorgare su confianza... se someterá la misma propuesta a nueva votación cuarenta y ocho horas después de la anterior..." },
            { id: 144, topic: "titulo4", tags: ["mayorias"], question: "En la segunda votación de investidura, para que la confianza se entienda otorgada se requiere:", options: ["Mayoría absoluta", "Mayoría simple", "Mayoría de 3/5", "Mayoría de 2/3"], correctIndex: 1, article: "Art. 99.3 CE", feedback: "...y la confianza se entenderá otorgada si obtuviere la mayoría simple." },
            { id: 145, topic: "titulo4", tags: ["plazos"], question: "Si transcurrido un plazo desde la primera votación de investidura, ningún candidato ha obtenido la confianza, el Rey disolverá ambas Cámaras. ¿De cuánto es este plazo?", options: ["Un mes", "Dos meses", "Tres meses", "Seis meses"], correctIndex: 1, article: "Art. 99.5 CE", feedback: "Si transcurrido el plazo de dos meses, a partir de la primera votación de investidura, ningún candidato hubiere obtenido la confianza del Congreso, el Rey disolverá ambas Cámaras..." },
            { id: 146, topic: "titulo4", tags: [], question: "Los miembros del Gobierno no podrán ejercer otras funciones representativas que:", options: ["Las propias del mandato parlamentario", "Las de alcalde", "Las de presidente autonómico", "Ninguna otra función"], correctIndex: 0, article: "Art. 98.3 CE", feedback: "Los miembros del Gobierno no podrán ejercer otras funciones representativas que las propias del mandato parlamentario..." },
            { id: 147, topic: "titulo4", tags: ["mayorias"], question: "Si la acusación contra un miembro del Gobierno fuere por traición o por cualquier delito contra la seguridad del Estado, sólo podrá ser planteada por iniciativa de:", options: ["Un cuarto de los miembros del Congreso, y aprobada por mayoría absoluta del mismo", "Un décimo de los miembros del Congreso", "El Rey", "El Tribunal Supremo"], correctIndex: 0, article: "Art. 102.2 CE", feedback: "...sólo podrá ser planteada por iniciativa de la cuarta parte de los miembros del Congreso, y con la aprobación de la mayoría absoluta del mismo." },
            { id: 148, topic: "titulo4", tags: [], question: "¿Se puede aplicar la prerrogativa de gracia (indulto) en el caso de responsabilidad criminal del Presidente y los Ministros?", options: ["Sí, como a cualquier ciudadano", "No, no será aplicable la prerrogativa de gracia", "Sólo si lo aprueba el Rey", "Sólo indultos parciales"], correctIndex: 1, article: "Art. 102.3 CE", feedback: "La prerrogativa de gracia no será aplicable a ninguno de los supuestos del presente artículo." },
            { id: 149, topic: "titulo4", tags: [], question: "La ley regulará el acceso a la función pública de acuerdo con los principios de:", options: ["Mérito y capacidad", "Igualdad y mérito", "Antigüedad y capacidad", "Objetividad y transparencia"], correctIndex: 0, article: "Art. 103.3 CE", feedback: "La ley regulará el estatuto de los funcionarios públicos, el acceso a la función pública de acuerdo con los principios de mérito y capacidad..." },
            { id: 150, topic: "titulo4", tags: [], question: "Las Fuerzas y Cuerpos de Seguridad, bajo la dependencia del Gobierno, tendrán como misión:", options: ["Proteger el libre ejercicio de los derechos y libertades y garantizar la seguridad ciudadana", "Garantizar la soberanía de España", "Sostener al Gobierno en el poder", "Administrar justicia"], correctIndex: 0, article: "Art. 104.1 CE", feedback: "Las Fuerzas y Cuerpos de seguridad... tendrán como misión proteger el libre ejercicio de los derechos y libertades y garantizar la seguridad ciudadana." },
            { id: 151, topic: "titulo4", tags: [], question: "El Consejo de Estado es:", options: ["El supremo órgano judicial", "El supremo órgano consultivo del Gobierno", "El órgano de gobierno de los Jueces", "Un ministerio del Gobierno"], correctIndex: 1, article: "Art. 107 CE", feedback: "El Consejo de Estado es el supremo órgano consultivo del Gobierno." },

            { id: 152, topic: "titulo5", tags: [], question: "Las Cámaras y sus Comisiones podrán recabar la información y ayuda que precisen de:", options: ["Únicamente del Gobierno", "El Gobierno y de sus Departamentos y de cualesquiera autoridades del Estado y de las CCAA", "Sólo de las autoridades judiciales", "La Corona"], correctIndex: 1, article: "Art. 109 CE", feedback: "...de cualesquiera autoridades del Estado y de las Comunidades Autónomas." },
            { id: 153, topic: "titulo5", tags: [], question: "Están obligados a comparecer a requerimiento de las Cámaras:", options: ["Sólo los miembros del Gobierno", "Sólo los funcionarios", "Cualquier persona que no sea aforada", "Los miembros del Gobierno (y los funcionarios y autoridades)"], correctIndex: 3, article: "Art. 110.1 y 110.2 CE", feedback: "Las Cámaras y sus Comisiones pueden reclamar la presencia de los miembros del Gobierno." },
            { id: 154, topic: "titulo5", tags: [], question: "Toda interpelación al Gobierno en las Cámaras podrá dar lugar a:", options: ["Una moción en la que la Cámara manifieste su posición", "El cese automático del Ministro", "Una disolución anticipada", "Una ley orgánica"], correctIndex: 0, article: "Art. 111.2 CE", feedback: "Toda interpelación podrá dar lugar a una moción en la que la Cámara manifieste su posición." },
            { id: 155, topic: "titulo5", tags: [], question: "El Gobierno dimisionario continuará en funciones hasta:", options: ["Que pasen 6 meses", "Que se convoquen elecciones", "La toma de posesión del nuevo Gobierno", "Que el Rey nombre un sustituto provisional"], correctIndex: 2, article: "Art. 114.1 CE", feedback: "El Gobierno dimisionario continuará en sus funciones hasta la toma de posesión del nuevo Gobierno." },
            { id: 156, topic: "titulo5", tags: ["plazos"], question: "El estado de alarma será declarado por el Gobierno mediante decreto acordado en Consejo de Ministros por un plazo máximo de:", options: ["Quince días", "Treinta días", "Dos meses", "Seis meses"], correctIndex: 0, article: "Art. 116.2 CE", feedback: "El estado de alarma será declarado por el Gobierno... por un plazo máximo de quince días, dando cuenta al Congreso..." },
            { id: 157, topic: "titulo5", tags: [], question: "Para la prórroga del estado de alarma, ¿qué se necesita?", options: ["Autorización del Senado", "Autorización del Congreso de los Diputados", "Aprobación del Rey", "Decisión unilateral del Gobierno"], correctIndex: 1, article: "Art. 116.2 CE", feedback: "...el cual deberá reunirse inmediatamente al efecto y sin cuya autorización no podrá ser prorrogado dicho plazo." },
            { id: 158, topic: "titulo5", tags: ["plazos"], question: "El estado de excepción será declarado por el Gobierno, previa autorización del Congreso de los Diputados. El plazo de duración no podrá exceder de:", options: ["Quince días", "Treinta días", "Dos meses", "Seis meses"], correctIndex: 1, article: "Art. 116.3 CE", feedback: "El plazo no podrá exceder de treinta días, prorrogable por otro plazo igual, con los mismos requisitos." },
            { id: 159, topic: "titulo5", tags: ["mayorias"], question: "El estado de sitio será declarado por:", options: ["El Gobierno", "La mayoría absoluta del Congreso de los Diputados, a propuesta exclusiva del Gobierno", "El Senado por mayoría de 3/5", "Las Cortes Generales en sesión conjunta"], correctIndex: 1, article: "Art. 116.4 CE", feedback: "El estado de sitio será declarado por la mayoría absoluta del Congreso de los Diputados, a propuesta exclusiva del Gobierno." },
            { id: 160, topic: "titulo5", tags: [], question: "Disuelto el Congreso o expirado su mandato, si se produjere alguna de las situaciones que dan lugar a los estados de alarma, excepción y sitio, las competencias del Congreso serán asumidas por:", options: ["El Gobierno", "El Senado", "La Diputación Permanente", "El Rey"], correctIndex: 2, article: "Art. 116.5 CE", feedback: "...las competencias del Congreso serán asumidas por su Diputación Permanente." },

            { id: 161, topic: "titulo6", tags: [], question: "La justicia será gratuita cuando así lo disponga la ley, y, en todo caso:", options: ["Para los pensionistas", "Para los menores de edad", "Respecto de quienes acrediten insuficiencia de recursos para litigar", "En asuntos laborales"], correctIndex: 2, article: "Art. 119 CE", feedback: "La justicia será gratuita... en todo caso, respecto de quienes acrediten insuficiencia de recursos para litigar." },
            { id: 162, topic: "titulo6", tags: [], question: "Las sentencias serán siempre motivadas y se pronunciarán en:", options: ["Privado", "Audiencia pública", "El BOE", "Presencia del Rey"], correctIndex: 1, article: "Art. 120.3 CE", feedback: "Las sentencias serán siempre motivadas y se pronunciarán en audiencia pública." },
            { id: 163, topic: "titulo6", tags: [], question: "Los daños causados por error judicial, así como los que sean consecuencia del funcionamiento anormal de la Administración de Justicia darán derecho a:", options: ["Una indemnización a cargo del Estado", "El cese del Juez", "Un nuevo juicio gratuito", "Ninguna compensación"], correctIndex: 0, article: "Art. 121 CE", feedback: "...darán derecho a una indemnización a cargo del Estado, conforme a la ley." },
            { id: 164, topic: "titulo6", tags: ["numeros"], question: "El mandato de los Vocales del Consejo General del Poder Judicial dura:", options: ["3 años", "4 años", "5 años", "Son vitalicios"], correctIndex: 2, article: "Art. 122.3 CE", feedback: "...veinte Vocales nombrados por el Rey por un período de cinco años." },
            { id: 165, topic: "titulo6", tags: ["numeros", "mayorias"], question: "De los 20 Vocales del CGPJ, ¿cuántos nombra el Congreso y cuántos el Senado elegidos entre abogados y otros juristas de reconocida competencia con más de 15 años de ejercicio?", options: ["4 el Congreso y 4 el Senado por mayoría de 3/5", "6 el Congreso y 6 el Senado", "10 el Congreso y 10 el Senado", "2 el Congreso y 2 el Senado"], correctIndex: 0, article: "Art. 122.3 CE", feedback: "...doce entre Jueces y Magistrados...; cuatro a propuesta del Congreso de los Diputados, y cuatro a propuesta del Senado, elegidos en ambos casos por mayoría de tres quintos..." },
            { id: 166, topic: "titulo6", tags: [], question: "El Fiscal General del Estado será nombrado por el Rey, a propuesta de:", options: ["El Congreso", "El CGPJ", "El Gobierno, oído el Consejo General del Poder Judicial", "El Ministerio de Justicia"], correctIndex: 2, article: "Art. 124.4 CE", feedback: "El Fiscal General del Estado será nombrado por el Rey, a propuesta del Gobierno, oído el Consejo General del Poder Judicial." },
            { id: 167, topic: "titulo6", tags: [], question: "Los ciudadanos podrán ejercer la acción popular y participar en la Administración de Justicia mediante la institución de:", options: ["El Jurado", "El Defensor del Pueblo", "El arbitraje", "Los Jueces de Paz"], correctIndex: 0, article: "Art. 125 CE", feedback: "Los ciudadanos podrán ejercer la acción popular y participar en la Administración de Justicia mediante la institución del Jurado..." },
            { id: 168, topic: "titulo6", tags: [], question: "La Policía Judicial depende de los Jueces, de los Tribunales y del Ministerio Fiscal en sus funciones de:", options: ["Mantenimiento del orden público", "Averiguación del delito y descubrimiento y aseguramiento del delincuente", "Control de fronteras", "Tráfico"], correctIndex: 1, article: "Art. 126 CE", feedback: "La policía judicial depende de los Jueces, de los Tribunales y del Ministerio Fiscal en sus funciones de averiguación del delito y descubrimiento y aseguramiento del delincuente..." },

            { id: 169, topic: "titulo7", tags: [], question: "La ley establecerá las formas de participación de los interesados en la Seguridad Social y en la actividad de:", options: ["Los partidos políticos", "Los organismos públicos cuya función afecte directamente a la calidad de la vida o al bienestar general", "El Gobierno", "Las Cortes"], correctIndex: 1, article: "Art. 129.1 CE", feedback: "...en la actividad de los organismos públicos cuya función afecte directamente a la calidad de la vida o al bienestar general." },
            { id: 170, topic: "titulo7", tags: [], question: "Los poderes públicos promoverán eficazmente las diversas formas de participación en la empresa y fomentarán, mediante una legislación adecuada, las sociedades:", options: ["Anónimas", "Limitadas", "Cooperativas", "De capital riesgo"], correctIndex: 2, article: "Art. 129.2 CE", feedback: "...fomentarán, mediante una legislación adecuada, las sociedades cooperativas. También establecerán los medios que faciliten el acceso de los trabajadores a la propiedad de los medios de producción." },
            { id: 171, topic: "titulo7", tags: [], question: "Los poderes públicos atenderán a la modernización y desarrollo de todos los sectores económicos y, en particular, de la agricultura, de la ganadería, de la pesca y de:", options: ["La industria turística", "La automoción", "La artesanía", "El transporte"], correctIndex: 2, article: "Art. 130.1 CE", feedback: "...y, en particular, de la agricultura, de la ganadería, de la pesca y de la artesanía, a fin de equiparar el nivel de vida de todos los españoles." },
            { id: 172, topic: "titulo7", tags: [], question: "La ley regulará los bienes de dominio público y los comunales, inspirándose en los principios de:", options: ["Inalienabilidad, imprescriptibilidad e inembargabilidad", "Eficacia, economía y rentabilidad", "Uso privativo y concesión", "Venta en subasta pública"], correctIndex: 0, article: "Art. 132.1 CE", feedback: "...inspirándose en los principios de inalienabilidad, imprescriptibilidad e inembargabilidad, así como su desafectación." },
            { id: 173, topic: "titulo7", tags: [], question: "Son bienes de dominio público estatal, en todo caso:", options: ["Los montes de utilidad pública", "Los ríos y lagos", "La zona marítimo-terrestre, las playas, el mar territorial y los recursos naturales de la zona económica y la plataforma continental", "Los parques nacionales"], correctIndex: 2, article: "Art. 132.2 CE", feedback: "Son bienes de dominio público estatal los que determine la ley y, en todo caso, la zona marítimo-terrestre, las playas, el mar territorial..." },
            { id: 174, topic: "titulo7", tags: [], question: "¿Tienen las Comunidades Autónomas y las Corporaciones locales capacidad para establecer tributos?", options: ["No, solo el Estado", "Sí, pero deben hacerlo mediante la delegación expresa del Estado", "Podrán establecer y exigir tributos, de acuerdo con la Constitución y las leyes", "Solo las CCAA, no los entes locales"], correctIndex: 2, article: "Art. 133.2 CE", feedback: "Las Comunidades Autónomas y las Corporaciones locales podrán establecer y exigir tributos, de acuerdo con la Constitución y las leyes." },
            { id: 175, topic: "titulo7", tags: [], question: "¿Qué ocurre si la Ley de Presupuestos no se aprobara antes del primer día del ejercicio económico correspondiente?", options: ["Se convocan elecciones", "Se suspenden los pagos del Estado", "Se considerarán automáticamente prorrogados los Presupuestos del ejercicio anterior", "El Rey aprueba unos presupuestos de urgencia"], correctIndex: 2, article: "Art. 134.4 CE", feedback: "Si la Ley de Presupuestos no se aprobara antes del primer día del ejercicio económico correspondiente, se considerarán automáticamente prorrogados los Presupuestos del ejercicio anterior hasta la aprobación de los nuevos." },
            { id: 176, topic: "titulo7", tags: [], question: "¿Puede crearse un tributo por Ley de Presupuestos?", options: ["No, nunca", "Sí, si la Ley lo dice explícitamente", "No podrá crear tributos. Podrá modificarlos cuando una ley tributaria sustantiva así lo prevea", "Sí, es el único método"], correctIndex: 2, article: "Art. 134.7 CE", feedback: "La Ley de Presupuestos no podrá crear tributos. Podrá modificarlos cuando una ley tributaria sustantiva así lo prevea." },
            { id: 177, topic: "titulo7", tags: [], question: "Todas las Administraciones Públicas adecuarán sus actuaciones al principio de estabilidad presupuestaria. El Estado y las Comunidades Autónomas no podrán incurrir en un déficit estructural que:", options: ["Supere el 3% del PIB", "Supere el de la Unión Europea", "Supere los márgenes establecidos, en su caso, por la Unión Europea para sus Estados Miembros", "Aumente la deuda pública"], correctIndex: 2, article: "Art. 135.2 CE", feedback: "El Estado y las Comunidades Autónomas no podrán incurrir en un déficit estructural que supere los márgenes establecidos, en su caso, por la Unión Europea..." },
            { id: 178, topic: "titulo7", tags: [], question: "Los créditos para satisfacer los intereses y el capital de la deuda pública de las Administraciones se entenderán siempre:", options: ["Incluidos en el estado de gastos de sus presupuestos y su pago gozará de prioridad absoluta", "Secundarios al gasto social", "Limitados por el Parlamento", "Negociables con los acreedores"], correctIndex: 0, article: "Art. 135.3 CE", feedback: "...se entenderán siempre incluidos en el estado de gastos de sus presupuestos y su pago gozará de prioridad absoluta." },

            { id: 179, topic: "titulo8", tags: [], question: "¿Disfrutan todas las entidades en las que se organiza el Estado territorialmente (municipios, provincias, CCAA) de autonomía?", options: ["Solo las CCAA", "Todas estas entidades gozan de autonomía para la gestión de sus respectivos intereses", "Solo los municipios y CCAA, las provincias no", "No se indica en la CE"], correctIndex: 1, article: "Art. 137 CE", feedback: "Todas estas entidades gozan de autonomía para la gestión de sus respectivos intereses." },
            { id: 180, topic: "titulo8", tags: [], question: "¿Puede admitirse la federación de Comunidades Autónomas?", options: ["Sí, mediante Ley Orgánica", "En ningún caso se admitirá la federación de Comunidades Autónomas", "Sí, si lo aprueban en referéndum", "Solo para las nacionalidades históricas"], correctIndex: 1, article: "Art. 145.1 CE", feedback: "En ningún caso se admitirá la federación de Comunidades Autónomas." },
            { id: 181, topic: "titulo8", tags: [], question: "Los Municipios gozan de personalidad jurídica plena. Su gobierno y administración corresponde a:", options: ["Las Diputaciones", "Sus respectivos Ayuntamientos, integrados por los Alcaldes y los Concejales", "El Gobierno de la Comunidad Autónoma", "Los Gobernadores Civiles"], correctIndex: 1, article: "Art. 140 CE", feedback: "Su gobierno y administración corresponde a sus respectivos Ayuntamientos, integrados por los Alcaldes y los Concejales." },
            { id: 182, topic: "titulo8", tags: [], question: "¿Quién elige a los Concejales de los Ayuntamientos?", options: ["El Alcalde", "Los vecinos del municipio mediante sufragio universal, igual, libre, directo y secreto", "Las Asambleas Autonómicas", "El Ministro del Interior"], correctIndex: 1, article: "Art. 140 CE", feedback: "Los Concejales serán elegidos por los vecinos del municipio mediante sufragio universal, igual, libre, directo y secreto..." },

        // ==========================================
        // ESTADO Y NAVEGACIÓN
        // ==========================================
        let appState = {
            settings: { topic: 'all', mode: 'study' },
            currentQuestions: [],
            currentIndex: 0,
            answers: [],
            startTime: null,
            timerInterval: null
        };

        function navigate(screenId) {
            document.querySelectorAll('#app-container > div').forEach(el => el.classList.add('hidden'));
            document.getElementById(`screen-${screenId}`).classList.remove('hidden');
            window.scrollTo(0, 0);
        }

        // ==========================================
        // SISTEMA DE MODALES (Reemplazo de alert/confirm)
        // ==========================================
        function showModal(title, text, isConfirm, onConfirmCallback = null) {
            document.getElementById('modal-title').innerText = title;
            document.getElementById('modal-text').innerText = text;
            
            const btnCancel = document.getElementById('modal-btn-cancel');
            const btnConfirm = document.getElementById('modal-btn-confirm');
            const modal = document.getElementById('custom-modal');

            if (isConfirm) {
                btnCancel.classList.remove('hidden');
                document.getElementById('modal-icon').className = "fas fa-question-circle text-4xl sm:text-5xl text-blue-500 mb-4 drop-shadow-sm";
            } else {
                btnCancel.classList.add('hidden');
                document.getElementById('modal-icon').className = "fas fa-exclamation-triangle text-4xl sm:text-5xl text-yellow-500 mb-4 drop-shadow-sm";
            }

            modal.classList.remove('hidden');

            btnConfirm.onclick = () => {
                modal.classList.add('hidden');
                if(onConfirmCallback) onConfirmCallback();
            };

            btnCancel.onclick = () => {
                modal.classList.add('hidden');
            };
        }

        function confirmExit() {
            showModal("¿Finalizar test?", "¿Quieres detener el test y volver al menú principal? Perderás el progreso actual.", true, () => {
                if(appState.timerInterval) clearInterval(appState.timerInterval);
                navigate('setup');
            });
        }

        function selectMode(mode) {
            document.getElementById('label-mode-study').className = "flex items-center p-4 sm:p-5 border-2 rounded-2xl cursor-pointer transition border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800";
            document.getElementById('label-mode-exam').className = "flex items-center p-4 sm:p-5 border-2 rounded-2xl cursor-pointer transition border-gray-200 dark:border-gray-700 bg-white dark:bg-gray-800";
            
            if(mode === 'study') {
                document.getElementById('label-mode-study').className = "flex items-center p-4 sm:p-5 border-2 rounded-2xl cursor-pointer transition border-blue-500 bg-blue-50 dark:bg-blue-900/30 dark:border-blue-400";
            } else {
                document.getElementById('label-mode-exam').className = "flex items-center p-4 sm:p-5 border-2 rounded-2xl cursor-pointer transition border-red-500 bg-red-50 dark:bg-red-900/30 dark:border-red-400";
            }
            appState.settings.mode = mode;
        }

        function startQuiz(repeat = false) {
            if (!repeat) {
                appState.settings.topic = document.getElementById('config-topic').value;
            }

            let pool = [];
            const t = appState.settings.topic;

            if (t === 'all') {
                pool = [...questionDatabase];
            } else if (t === 'plazos' || t === 'mayorias') {
                pool = questionDatabase.filter(q => q.tags && q.tags.includes(t));
            } else {
                pool = questionDatabase.filter(q => q.topic === t);
            }

            if (pool.length === 0) return showModal("Sin preguntas", "Aún no hay suficientes preguntas cargadas para esta categoría.", false);

            pool = pool.sort(() => Math.random() - 0.5).slice(0, 20);

            appState.currentQuestions = pool.map(q => {
                let optionsWithIndex = q.options.map((opt, idx) => ({ text: opt, isCorrect: idx === q.correctIndex }));
                optionsWithIndex = optionsWithIndex.sort(() => Math.random() - 0.5);
                return {
                    ...q,
                    shuffledOptions: optionsWithIndex,
                    correctShuffledIndex: optionsWithIndex.findIndex(o => o.isCorrect)
                };
            });

            appState.currentIndex = 0;
            appState.answers = new Array(pool.length).fill(null);
            
            document.getElementById('total-q-num').innerText = pool.length;
            document.getElementById('quiz-topic-display').innerText = getTopicName(t);
            
            if (appState.settings.mode === 'exam') {
                document.getElementById('timer-display').classList.remove('hidden');
                appState.startTime = Date.now();
                appState.timerInterval = setInterval(updateTimer, 1000);
            } else {
                document.getElementById('timer-display').classList.add('hidden');
            }

            navigate('quiz');
            renderQuestion();
        }

        function getTopicName(val) {
            const select = document.getElementById('config-topic');
            const option = Array.from(select.options).find(o => o.value === val);
            return option ? option.text.replace(/🔶|⏱️|⚖️|🌐/g, '').trim() : val;
        }

        function renderQuestion() {
            const q = appState.currentQuestions[appState.currentIndex];
            
            document.getElementById('current-q-num').innerText = appState.currentIndex + 1;
            const progress = ((appState.currentIndex) / appState.currentQuestions.length) * 100;
            document.getElementById('progress-bar').style.width = `${progress}%`;

            document.getElementById('question-text').innerText = q.question;
            const container = document.getElementById('options-container');
            container.innerHTML = '';

            q.shuffledOptions.forEach((opt, index) => {
                const btn = document.createElement('button');
                btn.className = "w-full text-left p-4 sm:p-5 rounded-2xl border-2 border-gray-100 dark:border-gray-700 bg-gray-50 dark:bg-gray-800 hover:bg-blue-50 dark:hover:bg-gray-700 transition font-semibold text-gray-700 dark:text-gray-200 option-btn text-base sm:text-lg flex items-center min-h-[70px]";
                btn.innerHTML = `<span class="shrink-0 w-8 h-8 rounded-full bg-white dark:bg-gray-900 text-center leading-8 mr-3 sm:mr-4 font-black text-gray-400 dark:text-gray-500 border border-gray-200 dark:border-gray-700 shadow-sm">${String.fromCharCode(65+index)}</span> <span class="flex-grow">${opt.text}</span>`;
                btn.onclick = () => selectAnswer(index);
                container.appendChild(btn);
            });

            document.getElementById('feedback-container').classList.add('hidden');
            document.getElementById('btn-next').classList.add('hidden');
            document.getElementById('btn-finish').classList.add('hidden');

            if(appState.settings.mode === 'exam') {
                const isLast = appState.currentIndex === appState.currentQuestions.length - 1;
                const skipBtn = document.createElement('button');
                skipBtn.className = "text-gray-400 dark:text-gray-500 hover:text-gray-600 dark:hover:text-gray-300 underline font-bold px-4 py-4 w-full text-center block text-sm transition mt-2 active:scale-95";
                skipBtn.innerText = "Dejar en blanco y continuar";
                skipBtn.onclick = () => {
                    appState.answers[appState.currentIndex] = { selected: null, correct: false, blank: true };
                    isLast ? finishQuiz() : nextQuestion();
                };
                container.appendChild(skipBtn);
            }
        }

        function selectAnswer(selectedIndex) {
            const q = appState.currentQuestions[appState.currentIndex];
            const isCorrect = selectedIndex === q.correctShuffledIndex;
            
            appState.answers[appState.currentIndex] = { selected: selectedIndex, correct: isCorrect, blank: false };

            const btns = document.querySelectorAll('.option-btn');
            
            if (appState.settings.mode === 'study') {
                btns.forEach(b => b.classList.add('disabled-option')); 
                
                btns[q.correctShuffledIndex].classList.remove('bg-gray-50', 'dark:bg-gray-800', 'border-gray-100', 'dark:border-gray-700');
                btns[q.correctShuffledIndex].classList.add('bg-green-100', 'dark:bg-green-900/40', 'border-green-500', 'dark:border-green-500', 'text-green-900', 'dark:text-green-100');
                
                if (!isCorrect) {
                    btns[selectedIndex].classList.remove('bg-gray-50', 'dark:bg-gray-800', 'border-gray-100', 'dark:border-gray-700');
                    btns[selectedIndex].classList.add('bg-red-100', 'dark:bg-red-900/40', 'border-red-500', 'dark:border-red-500', 'text-red-900', 'dark:text-red-100');
                }

                document.getElementById('feedback-article').innerText = q.article;
                document.getElementById('feedback-text').innerText = q.feedback;
                document.getElementById('feedback-container').classList.remove('hidden');

                if (appState.currentIndex === appState.currentQuestions.length - 1) {
                    document.getElementById('btn-finish').classList.remove('hidden');
                } else {
                    document.getElementById('btn-next').classList.remove('hidden');
                }
            } else {
                btns.forEach(b => {
                    b.classList.remove('bg-blue-100', 'dark:bg-blue-900/40', 'border-blue-500', 'dark:border-blue-500');
                    b.classList.add('bg-gray-50', 'dark:bg-gray-800', 'border-gray-100', 'dark:border-gray-700');
                });
                
                btns[selectedIndex].classList.remove('bg-gray-50', 'dark:bg-gray-800', 'border-gray-100', 'dark:border-gray-700');
                btns[selectedIndex].classList.add('bg-blue-100', 'dark:bg-blue-900/40', 'border-blue-500', 'dark:border-blue-500');
                
                if (appState.currentIndex === appState.currentQuestions.length - 1) {
                    document.getElementById('btn-finish').classList.remove('hidden');
                } else {
                    document.getElementById('btn-next').classList.remove('hidden');
                }
            }
        }

        function nextQuestion() {
            appState.currentIndex++;
            renderQuestion();
        }

        function finishQuiz() {
            if(appState.timerInterval) clearInterval(appState.timerInterval);
            
            let corrects = 0, wrongs = 0, blanks = 0;

            appState.answers.forEach((ans) => {
                if (!ans || ans.blank) blanks++;
                else if (ans.correct) corrects++;
                else wrongs++;
            });

            const totalQ = appState.currentQuestions.length;
            const nota10 = (corrects / totalQ) * 10;

            document.getElementById('res-correct').innerText = corrects;
            document.getElementById('res-wrong').innerText = wrongs;
            document.getElementById('res-blank').innerText = blanks;
            document.getElementById('res-score').innerText = nota10.toFixed(2);

            let scoreColor = nota10 >= 5 ? 'text-green-600 dark:text-green-400' : 'text-red-600 dark:text-red-400';
            document.getElementById('res-score').className = `text-6xl font-black ${scoreColor}`;

            if(appState.settings.mode === 'exam') {
                document.getElementById('result-mode-text').innerText = `Tiempo empleado: ${document.getElementById('timer-display').innerText}`;
            } else {
                document.getElementById('result-mode-text').innerText = "Repaso finalizado con éxito.";
            }

            renderReview();
            navigate('results');
            document.getElementById('progress-bar').style.width = `100%`;
        }

        function renderReview() {
            const container = document.getElementById('review-container');
            container.innerHTML = '';

            appState.currentQuestions.forEach((q, i) => {
                const ans = appState.answers[i];
                const div = document.createElement('div');
                div.className = "bg-white dark:bg-gray-800 border-2 rounded-2xl p-4 sm:p-5 shadow-sm text-left relative overflow-hidden";
                
                let icon = '';
                let borderClass = '';
                let bgRibbon = '';
                
                if(!ans || ans.blank) {
                    icon = '<i class="fas fa-minus-circle text-gray-400 dark:text-gray-500 text-2xl mr-3 mt-1 shrink-0"></i>';
                    borderClass = 'border-gray-200 dark:border-gray-700';
                    bgRibbon = '<div class="absolute left-0 top-0 bottom-0 w-2 bg-gray-300 dark:bg-gray-600"></div>';
                } else if(ans.correct) {
                    icon = '<i class="fas fa-check-circle text-green-500 dark:text-green-400 text-2xl mr-3 mt-1 shrink-0"></i>';
                    borderClass = 'border-green-200 dark:border-green-800/50';
                    bgRibbon = '<div class="absolute left-0 top-0 bottom-0 w-2 bg-green-500 dark:bg-green-500"></div>';
                } else {
                    icon = '<i class="fas fa-times-circle text-red-500 dark:text-red-400 text-2xl mr-3 mt-1 shrink-0"></i>';
                    borderClass = 'border-red-200 dark:border-red-800/50';
                    bgRibbon = '<div class="absolute left-0 top-0 bottom-0 w-2 bg-red-500 dark:bg-red-500"></div>';
                }
                div.classList.add(...borderClass.split(' '));

                const correctText = q.shuffledOptions[q.correctShuffledIndex].text;
                const userText = (ans && !ans.blank && ans.selected !== null) ? q.shuffledOptions[ans.selected].text : "No respondida";

                let html = `
                    ${bgRibbon}
                    <div class="flex items-start mb-4 pl-3 sm:pl-4">
                        ${icon}
                        <p class="font-bold text-gray-800 dark:text-white text-base sm:text-lg">${i+1}. ${q.question}</p>
                    </div>
                    <div class="pl-10 sm:pl-12 space-y-3 text-sm sm:text-base">
                        <div class="p-3 sm:p-4 rounded-xl bg-green-50 dark:bg-green-900/20 border border-green-100 dark:border-green-800/50 text-green-900 dark:text-green-100 font-medium">
                            <span class="font-bold uppercase text-[10px] sm:text-xs text-green-700 dark:text-green-400 block mb-1">Respuesta correcta</span> 
                            ${correctText}
                        </div>
                `;

                if(!ans || !ans.correct) {
                    html += `
                        <div class="p-3 sm:p-4 rounded-xl bg-red-50 dark:bg-red-900/20 border border-red-100 dark:border-red-800/50 text-red-900 dark:text-red-100">
                            <span class="font-bold uppercase text-[10px] sm:text-xs text-red-700 dark:text-red-400 block mb-1">Tu respuesta</span> 
                            ${userText}
                        </div>
                    `;
                }

                html += `
                        <div class="mt-4 text-gray-700 dark:text-gray-200 bg-blue-50 dark:bg-blue-900/20 p-4 rounded-xl border border-blue-100 dark:border-blue-800/50">
                            <strong class="text-blue-800 dark:text-blue-200 bg-blue-200 dark:bg-blue-800 px-2 py-1 rounded text-xs mr-2 shrink-0 inline-block mb-1">${q.article}</strong> 
                            <span class="font-medium">${q.feedback}</span>
                        </div>
                    </div>
                `;

                div.innerHTML = html;
                container.appendChild(div);
            });
        }

        function updateTimer() {
            const now = Date.now();
            const diff = Math.floor((now - appState.startTime) / 1000);
            const m = Math.floor(diff / 60).toString().padStart(2, '0');
            const s = (diff % 60).toString().padStart(2, '0');
            document.getElementById('timer-display').innerText = `${m}:${s}`;
        }
    </script>
</body>
</html>
